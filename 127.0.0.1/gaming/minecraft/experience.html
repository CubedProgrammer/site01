<!DOCTYPE HTML>
<html>
	<head>
		<title>Experience</title>
		<link rel="stylesheet" href="experience.css">
	</head>
	<body>
		<h1>Experience</h1>
		<p>Doing certain tasks grants the player experience points, which can cause the player to level up. The higher your level, the more experience you need to reach the next level. The required experience is quadratic with respect to levels.</p>
		<div id="calcdiv">
			<label for="expi">Experience</label>
			<input type="number" value="0" id="expi">
			<br>
			<label for="lvli">Level</label>
			<input type="number" value="0" id="lvli">
			<br>
			<button id="fromlevel">Level to Experience</button>
			<button id="tolevel">Experience to Level</button>
		</div>
		<script src="experience.js"></script>
	</body>
</html>
